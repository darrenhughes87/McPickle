<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>McPICKLES</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#2D5038">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="McPICKLES">
  <style>
    :root {
      --pickle-dark:   #2D5038;
      --pickle-mid:    #4A7C59;
      --pickle-light:  #8DB87B;
      --pickle-yellow: #D4B44A;
      --black:         #1A1A1A;
      --cream:         #F5F0E8;
      --red:           #C0392B;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Oswald', sans-serif;
      background-color: var(--pickle-dark);
      color: var(--cream);
      overflow-x: hidden;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* Checkerboard header */
    .checker-bar {
      width: 100%;
      height: 18px;
      background-image: repeating-conic-gradient(var(--black) 0% 25%, var(--pickle-mid) 0% 50%);
      background-size: 18px 18px;
      flex-shrink: 0;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 1.5rem;
      gap: 0.5rem;
    }
    .logo-icon {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      border: 4px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      background: var(--pickle-mid);
    }
    .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.6rem;
      letter-spacing: 3px;
      color: var(--cream);
      text-shadow: 3px 3px 0 var(--black);
      line-height: 1;
    }
    .mc-prefix {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 0.9em;
      letter-spacing: 0;
      margin-right: 0.04em;
    }
    .logo-sub {
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--pickle-light);
      text-transform: uppercase;
    }

    .card {
      background: var(--cream);
      color: var(--black);
      border: 3px solid var(--black);
      box-shadow: 5px 5px 0 var(--black);
      border-radius: 8px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 400px;
      margin: 0 1rem;
    }
    .card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 0.25rem;
      color: var(--pickle-dark);
    }
    .card p {
      font-size: 0.9rem;
      font-weight: 300;
      color: #555;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--pickle-dark);
      margin-bottom: 0.4rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      border: 2.5px solid var(--black);
      border-radius: 4px;
      background: #fff;
      color: var(--black);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--pickle-mid); }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.85rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--cream);
      background: var(--pickle-dark);
      border: 2.5px solid var(--black);
      border-radius: 4px;
      box-shadow: 3px 3px 0 var(--black);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--black); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      margin-top: 0.75rem;
      padding: 0.6rem 0.8rem;
      background: #ffeaea;
      border: 2px solid var(--red);
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--red);
      display: none;
    }
    .error-msg.show { display: block; }

    .admin-link {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--pickle-light);
      text-align: center;
    }
    .admin-link a {
      color: var(--pickle-light);
      text-decoration: underline;
    }

    /* iOS install banner */
    .install-banner {
      display: none;
      width: 100%;
      max-width: 400px;
      margin: 1rem 1rem 0;
      background: var(--pickle-mid);
      border: 2.5px solid var(--black);
      box-shadow: 3px 3px 0 var(--black);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      font-size: 0.85rem;
      color: var(--cream);
    }
    .install-banner.show { display: block; }
    .install-banner strong { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 0.25rem; }

    .footer-checker {
      margin-top: auto;
      width: 100%;
      height: 18px;
      background-image: repeating-conic-gradient(var(--black) 0% 25%, var(--pickle-mid) 0% 50%);
      background-size: 18px 18px;
    }
  </style>
</head>
<body>
  <div class="checker-bar"></div>

  <div class="hero">
    <img src="/icon.svg" alt="McPICKLES" class="logo-icon">
    <div class="logo-title"><span class="mc-prefix">Mc</span>PICKLES</div>
    <div class="logo-sub">Pickleball Squad</div>
  </div>

  <div id="install-banner" class="install-banner">
    <strong>📲 Add to your home screen!</strong>
    Tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong> for the full app experience.
  </div>

  <div class="card">
    <h2>Join the squad</h2>
    <p>Enter your name to get started. Ask Darren if you don't have one yet.</p>
    <label for="username">Your name</label>
    <input type="text" id="username" placeholder="e.g. FirstnameSurname" autocomplete="off" autocapitalize="none" spellcheck="false">
    <button class="btn" id="login-btn">Let's Play!</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="admin-link">
    <a href="/admin.html">Admin login</a>
  </div>

  <div class="footer-checker"></div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }

    // iOS install banner
    const isIos = () => /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (isIos() && !isStandalone()) document.getElementById('install-banner').classList.add('show');

    // Check existing session
    fetch('/api/auth/me').then(r => {
      if (r.ok) return r.json().then(d => {
        if (d.admin) { window.location.replace('/admin-dash.html'); return; }
        if (d.user) { window.location.replace('/dashboard.html'); }
      });
    }).catch(() => {});

    const usernameInput = document.getElementById('username');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }
    function clearError() { errorMsg.classList.remove('show'); }

    loginBtn.addEventListener('click', doLogin);
    usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const username = usernameInput.value.trim();
      if (!username) { showError('Please enter your name'); return; }
      clearError();
      loginBtn.disabled = true;
      loginBtn.textContent = 'Joining...';

      try {
        const res = await fetch('/api/auth/user-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Login failed'); return; }
        localStorage.setItem('mp_display_name', data.user.display_name);
        localStorage.setItem('mp_user_id', data.user.id);
        window.location.replace('/dashboard.html');
      } catch {
        showError('Network error — try again');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Let's Play!";
      }
    }
  </script>
</body>
</html>
